    environment:
      <<: *common-env
    volumes:
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-sim-6.0.0/cache/main
        target: /isaac-sim/.cache
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-sim-6.0.0/cache/main
        target: /isaac-sim/kit/cache
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-sim-6.0.0/cache/computecache
        target: /isaac-sim/.nv/ComputeCache
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-sim-6.0.0/logs
        target: /isaac-sim/.nvidia-omniverse/logs
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-sim-6.0.0/logs
        target: /isaac-sim/kit/logs
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-sim-6.0.0/config
        target: /isaac-sim/.nvidia-omniverse/config
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-sim-6.0.0/data
        target: /isaac-sim/.local/share/ov/data
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-sim-6.0.0/data/Kit
        target: /isaac-sim/data/Kit
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-sim-6.0.0/data/documents
        target: /isaac-sim/kit/data/documents
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-sim-6.0.0/data/Kit
        target: /isaac-sim/kit/data/Kit
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-sim-6.0.0/pkg
        target: /isaac-sim/.local/share/ov/pkg
      - type: bind
        source: ../
        target: ${WORKSPACE_ROOT}
      - type: bind
        source: ${X11_SOCKET_DIR}
        target: /tmp/.X11-unix
      - type: bind
        source: ${XAUTHORITY}
        target: ${XAUTHORITY}
    <<: *common-stdin

  isaac-lab-2-3-2:
    env_file: .env.base
    build:
      <<: *runtime-build
      args:
        BASE_IMAGE: ${ISAAC_LAB_IMAGE}
        WORKSPACE_ROOT: ${WORKSPACE_ROOT}
        HOST_UID: ${HOST_UID}
        HOST_GID: ${HOST_GID}
    image: ${ISAAC_LAB_TAG}
    container_name: ${ISAAC_LAB_CONTAINER}
    profiles: ["isaac-lab-2.3.2"]
    environment:
      <<: *common-env
    volumes:
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-lab-2.3.2/cache/kit
        target: /isaac-sim/kit/cache
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-lab-2.3.2/cache/ov
        target: /root/.cache/ov
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-lab-2.3.2/cache/pip
        target: /root/.cache/pip
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-lab-2.3.2/cache/glcache
        target: /root/.cache/nvidia/GLCache
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-lab-2.3.2/cache/computecache
        target: /root/.nv/ComputeCache
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-lab-2.3.2/logs
        target: /root/.nvidia-omniverse/logs
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-lab-2.3.2/data
        target: /root/.local/share/ov/data
      - type: bind
        source: ${ISAAC_DOCKER_ROOT}/isaac-lab-2.3.2/documents
        target: /root/Documents
      - type: bind
        source: ../
        target: ${WORKSPACE_ROOT}
      - type: bind
