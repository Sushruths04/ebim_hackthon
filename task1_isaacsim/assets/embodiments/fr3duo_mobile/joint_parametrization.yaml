embodiment_key: fr3duo_mobile
version: "1.0"
description: "Joint definitions for the FR3 Duo mobile platform: 3-DOF omnidirectional base + 7-DOF per arm."

# ── Mobile base (3-DOF planar) ────────────────────────────────────────────────

base_group:
  base_name: "Omnidirectional Mobile Base"
  base_type: omnidirectional_wheeled
  control_mode: velocity
  controllable_dof:
    - name: base_x
      index: 0
      type: prismatic
      axis: x
      limits:
        lower_m: -100.0
        upper_m:  100.0
      velocity_limit_m_s: 1.0
      effort_limit_n: 500.0

    - name: base_y
      index: 1
      type: prismatic
      axis: y
      limits:
        lower_m: -100.0
        upper_m:  100.0
      velocity_limit_m_s: 1.0
      effort_limit_n: 500.0

    - name: base_theta
      index: 2
      type: revolute
      axis: z
      limits:
        lower_rad: -3.1416
        upper_rad:  3.1416
      velocity_limit_rad_s: 1.5708
      effort_limit_nm: 50.0

# ── Arm groups (identical to fr3duo_m+v) ─────────────────────────────────────

arm_groups:
  left:
    arm_name: "Left FR3v2"
    base_link: left_fr3v2_link0
    ee_link: left_fr3v2_link8
    usd_joint_scope: /ai_cell/joints
    controllable_joints:
      - name: left_fr3v2_joint1
        index: 3
        type: revolute
        axis: z
        usd_prim_path: /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_joint1
        body0: /ai_cell/left_FR3/left_fr3v2_link0
        body1: /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1
        limits:
          lower_rad: -2.8973
          upper_rad:  2.8973
        home_position_rad: 0.0
        velocity_limit_rad_s: 2.175
        effort_limit_nm: 87.0

      - name: left_fr3v2_joint2
        index: 4
        type: revolute
        axis: y
        usd_prim_path: /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1/left_fr3v2_joint2
        body0: /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1
        body1: /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1/left_fr3v2_link2
