notes: |
  DOF indices: 0-2 = base (x, y, theta); 3-9 = left arm; 10-16 = right arm.
  Total controllable DOF: 17 (3 base + 7 left arm + 7 right arm).
  Arm joint limits and home positions are identical to fr3duo_m+v.
  Base DOF uses velocity control; arm DOF uses position/acceleration control.
