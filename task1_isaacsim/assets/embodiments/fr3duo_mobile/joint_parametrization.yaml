    gripper:
      type: robotiq_2f85
      driver_joint: left_robotiq_85_left_knuckle_joint
      open_position_rad: 0.0
      closed_position_rad: 0.804
      all_joints:
        - name: left_robotiq_85_left_knuckle_joint
          usd_prim_path: /ai_cell/joints/left_fr3v2_robotiq_85_left_knuckle_joint
