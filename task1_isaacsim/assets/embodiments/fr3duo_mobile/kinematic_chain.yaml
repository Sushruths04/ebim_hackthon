embodiment_key: fr3duo_mobile
version: "1.0"
description: >
  Rigid-body kinematic tree for the FR3 Duo mobile-base configuration.
  Includes a 3-DOF planar base carrying both FR3v2 arms.
  Arm transforms are expressed relative to the mobile base frame.
  Values match the Franka FR3v2 URDF DH parameters.

base_frame: world

links:
  world:
    description: "Scene origin / world frame"
    inertia_mass: 0.0

  # ── Mobile base ─────────────────────────────────────────────────────────────

  mobile_base:
    description: "Omnidirectional mobile base (chassis)"
    parent: world
    joint_to_parent: base_planar_joint
    transform_xyz_m:   [0.0, 0.0, 0.0]
    transform_rpy_rad: [0.0, 0.0, 0.0]
    inertia_mass_kg: 80.0
    dof: 3
    dof_axes: [x, y, rz]
    usd_prim_path: /ai_cell/mobile_base

  # ── Left arm (mounted on mobile base) ───────────────────────────────────────

  left_fr3v2_link0:
    description: "Left arm base link (bolted to mobile base)"
    parent: mobile_base
    joint_to_parent: left_fr3v2_joint0_fixed
    transform_xyz_m:   [-0.3,  0.0,  0.89]
    transform_rpy_rad: [ 0.0,  0.0,  0.0]
    inertia_mass_kg: 2.5
    usd_prim_path: /ai_cell/left_fr3v2_link0

  left_fr3v2_link1:
    description: "Left arm link 1"
    parent: left_fr3v2_link0
    joint_to_parent: left_fr3v2_joint1
    transform_xyz_m:   [ 0.0,  0.0,  0.333]
    transform_rpy_rad: [ 0.0,  0.0,  0.0]
    inertia_mass_kg: 2.92
    usd_prim_path: /ai_cell/left_fr3v2_link1

  left_fr3v2_link2:
    description: "Left arm link 2"
    parent: left_fr3v2_link1
    joint_to_parent: left_fr3v2_joint2
    transform_xyz_m:   [ 0.0,  0.0,  0.0]
    transform_rpy_rad: [-1.5708,  0.0,  0.0]
    inertia_mass_kg: 2.36
    usd_prim_path: /ai_cell/left_fr3v2_link2

  left_fr3v2_link3:
    description: "Left arm link 3"
    parent: left_fr3v2_link2
    joint_to_parent: left_fr3v2_joint3
    transform_xyz_m:   [ 0.0, -0.316,  0.0]
    transform_rpy_rad: [ 1.5708,  0.0,  0.0]
    inertia_mass_kg: 2.38
    usd_prim_path: /ai_cell/left_fr3v2_link3

  left_fr3v2_link4:
    description: "Left arm link 4"
    parent: left_fr3v2_link3
    joint_to_parent: left_fr3v2_joint4
    transform_xyz_m:   [ 0.0825,  0.0,  0.0]
    transform_rpy_rad: [ 1.5708,  0.0,  0.0]
    inertia_mass_kg: 2.43
    usd_prim_path: /ai_cell/left_fr3v2_link4

  left_fr3v2_link5:
    description: "Left arm link 5"
    parent: left_fr3v2_link4
    joint_to_parent: left_fr3v2_joint5
    transform_xyz_m:   [-0.0825,  0.384,  0.0]
    transform_rpy_rad: [-1.5708,  0.0,  0.0]
    inertia_mass_kg: 3.50
    usd_prim_path: /ai_cell/left_fr3v2_link5

  left_fr3v2_link6:
    description: "Left arm link 6"
    parent: left_fr3v2_link5
    joint_to_parent: left_fr3v2_joint6
    transform_xyz_m:   [ 0.0,  0.0,  0.0]
    transform_rpy_rad: [ 1.5708,  0.0,  0.0]
    inertia_mass_kg: 1.47
    usd_prim_path: /ai_cell/left_fr3v2_link6

  left_fr3v2_link7:
    description: "Left arm link 7"
    parent: left_fr3v2_link6
    joint_to_parent: left_fr3v2_joint7
    transform_xyz_m:   [ 0.088,  0.0,  0.0]
    transform_rpy_rad: [ 1.5708,  0.0,  0.0]
    inertia_mass_kg: 0.45
    usd_prim_path: /ai_cell/left_fr3v2_link7

  left_fr3v2_link8:
    description: "Left arm flange / end-effector mount"
    parent: left_fr3v2_link7
    joint_to_parent: left_fr3v2_joint8_fixed
    transform_xyz_m:   [ 0.0,  0.0,  0.107]
    transform_rpy_rad: [ 0.0,  0.0, 0.0]
    inertia_mass_kg: 0.0
    usd_prim_path: /ai_cell/left_fr3v2_link8

  # ── Right arm (mounted on mobile base, facing left) ──────────────────────────

  right_fr3v2_link0:
    description: "Right arm base link (bolted to mobile base)"
    parent: mobile_base
    joint_to_parent: right_fr3v2_joint0_fixed
    transform_xyz_m:   [ 0.3,  0.0,  0.89]
    transform_rpy_rad: [ 0.0,  0.0,  3.1416]
    inertia_mass_kg: 2.5
    usd_prim_path: /ai_cell/right_fr3v2_link0

  right_fr3v2_link1:
    description: "Right arm link 1"
    parent: right_fr3v2_link0
    joint_to_parent: right_fr3v2_joint1
    transform_xyz_m:   [ 0.0,  0.0,  0.333]
    transform_rpy_rad: [ 0.0,  0.0,  0.0]
    inertia_mass_kg: 2.92
    usd_prim_path: /ai_cell/right_fr3v2_link1

  right_fr3v2_link2:
    description: "Right arm link 2"
    parent: right_fr3v2_link1
    joint_to_parent: right_fr3v2_joint2
    transform_xyz_m:   [ 0.0,  0.0,  0.0]
    transform_rpy_rad: [-1.5708,  0.0,  0.0]
    inertia_mass_kg: 2.36
    usd_prim_path: /ai_cell/right_fr3v2_link2

  right_fr3v2_link3:
    description: "Right arm link 3"
    parent: right_fr3v2_link2
    joint_to_parent: right_fr3v2_joint3
    transform_xyz_m:   [ 0.0, -0.316,  0.0]
    transform_rpy_rad: [ 1.5708,  0.0,  0.0]
    inertia_mass_kg: 2.38
    usd_prim_path: /ai_cell/right_fr3v2_link3

  right_fr3v2_link4:
    description: "Right arm link 4"
    parent: right_fr3v2_link3
    joint_to_parent: right_fr3v2_joint4
    transform_xyz_m:   [ 0.0825,  0.0,  0.0]
    transform_rpy_rad: [ 1.5708,  0.0,  0.0]
    inertia_mass_kg: 2.43
    usd_prim_path: /ai_cell/right_fr3v2_link4

  right_fr3v2_link5:
    description: "Right arm link 5"
    parent: right_fr3v2_link4
    joint_to_parent: right_fr3v2_joint5
    transform_xyz_m:   [-0.0825,  0.384,  0.0]
    transform_rpy_rad: [-1.5708,  0.0,  0.0]
    inertia_mass_kg: 3.50
    usd_prim_path: /ai_cell/right_fr3v2_link5

  right_fr3v2_link6:
    description: "Right arm link 6"
    parent: right_fr3v2_link5
    joint_to_parent: right_fr3v2_joint6
    transform_xyz_m:   [ 0.0,  0.0,  0.0]
    transform_rpy_rad: [ 1.5708,  0.0,  0.0]
    inertia_mass_kg: 1.47
    usd_prim_path: /ai_cell/right_fr3v2_link6

  right_fr3v2_link7:
    description: "Right arm link 7"
    parent: right_fr3v2_link6
    joint_to_parent: right_fr3v2_joint7
    transform_xyz_m:   [ 0.088,  0.0,  0.0]
    transform_rpy_rad: [ 1.5708,  0.0,  0.0]
    inertia_mass_kg: 0.45
    usd_prim_path: /ai_cell/right_fr3v2_link7

  right_fr3v2_link8:
    description: "Right arm flange / end-effector mount"
    parent: right_fr3v2_link7
    joint_to_parent: right_fr3v2_joint8_fixed
    transform_xyz_m:   [ 0.0,  0.0,  0.107]
    transform_rpy_rad: [ 0.0,  0.0, 0.0]
    inertia_mass_kg: 0.0
    usd_prim_path: /ai_cell/right_fr3v2_link8

notes: |
  The mobile_base link is the kinematic root of both arm chains.
  Base planar DOF (x, y, rz) makes the full robot pose world-frame dependent.
  All arm transforms are expressed in the mobile_base frame at home configuration.
  USD prim paths reflect the flat /ai_cell/ hierarchy required by Isaac Sim 5.1 PhysX.
