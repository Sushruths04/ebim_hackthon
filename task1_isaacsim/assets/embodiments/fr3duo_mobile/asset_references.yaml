embodiment_key: fr3duo_mobile
version: "1.0"
description: "Asset file references and USD articulation structure for the FR3 Duo mobile-base configuration."

# ── Primary simulation asset ──────────────────────────────────────────────────

primary_usd:
  path: /workspace/assets/digital_twin_fr3Duo_mobile.usd
  format: usdc
  description: "Compiled binary USD for the mobile-base dual-arm variant (simulation-only, pending build)."
  default_prim: ai_cell
  status: pending

# ── USD articulation layout ───────────────────────────────────────────────────
#
# Isaac Sim 5.1 / PhysX constraint: a joint is included in an articulation only
# when its body0 prim is a DIRECT child of the articulation root scope.
# Arm link prims must remain flat under /ai_cell/ (not nested under mobile_base/).
# Base mobility DOFs are handled via a planar joint on the mobile_base prim.
#
# Guide reference: USD_7DOF_Arm_Articulation_Guide.md

usd_articulation:
  scene_root: /ai_cell

  articulation_root:
    prim_path: /ai_cell/root_joint
    prim_type: PhysicsFixedJoint
    api_applied: ArticulationRootAPI
    body0: null
    body1: /ai_cell/mobile_base
    self_collision: false
    description: >
      ArticulationRootAPI on the fixed root joint anchoring the ai_cell to the world.
      For the mobile variant, body1 is the mobile_base chassis prim.

  isaac_robot_api:
    apply_to: /ai_cell
    status: required
    description: >
      IsaacRobotAPI must be applied to /ai_cell to auto-populate IsaacLinkAPI
      and IsaacJointAPI on all discovered rigid bodies and joints, enabling
      correct DOF ordering and joint name resolution. Re-apply after adding joints.

  solver:
    position_iterations: 64
    velocity_iterations: 4
    description: "Per USD_7DOF_Arm_Articulation_Guide.md recommendation for manipulation stability."

  link_layout:
    description: >
      Links are organized under /ai_cell/left_FR3/ and /ai_cell/right_FR3/ (pure
      organizational Xforms, no RigidBodyAPI). Each link is nested under its parent
      in the serial chain: link0 → link1 → … → link7. Mobile base is a direct child of /ai_cell.
    base:
      - /ai_cell/mobile_base
    left_arm:
      - /ai_cell/left_FR3/left_fr3v2_link0
      - /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1
      - /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1/left_fr3v2_link2
      - /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1/left_fr3v2_link2/left_fr3v2_link3
      - /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1/left_fr3v2_link2/left_fr3v2_link3/left_fr3v2_link4
      - /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1/left_fr3v2_link2/left_fr3v2_link3/left_fr3v2_link4/left_fr3v2_link5
      - /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1/left_fr3v2_link2/left_fr3v2_link3/left_fr3v2_link4/left_fr3v2_link5/left_fr3v2_link6
      - /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1/left_fr3v2_link2/left_fr3v2_link3/left_fr3v2_link4/left_fr3v2_link5/left_fr3v2_link6/left_fr3v2_link7
    right_arm:
      - /ai_cell/right_FR3/right_fr3v2_link0
      - /ai_cell/right_FR3/right_fr3v2_link0/right_fr3v2_link1
      - /ai_cell/right_FR3/right_fr3v2_link0/right_fr3v2_link1/right_fr3v2_link2
      - /ai_cell/right_FR3/right_fr3v2_link0/right_fr3v2_link1/right_fr3v2_link2/right_fr3v2_link3
      - /ai_cell/right_FR3/right_fr3v2_link0/right_fr3v2_link1/right_fr3v2_link2/right_fr3v2_link3/right_fr3v2_link4
      - /ai_cell/right_FR3/right_fr3v2_link0/right_fr3v2_link1/right_fr3v2_link2/right_fr3v2_link3/right_fr3v2_link4/right_fr3v2_link5
      - /ai_cell/right_FR3/right_fr3v2_link0/right_fr3v2_link1/right_fr3v2_link2/right_fr3v2_link3/right_fr3v2_link4/right_fr3v2_link5/right_fr3v2_link6
      - /ai_cell/right_FR3/right_fr3v2_link0/right_fr3v2_link1/right_fr3v2_link2/right_fr3v2_link3/right_fr3v2_link4/right_fr3v2_link5/right_fr3v2_link6/right_fr3v2_link7

  joint_layout:
    description: "Each arm joint is a child of its body0 (parent) link prim, per USD_7DOF_Arm_Articulation_Guide."
    base:
      - /ai_cell/mobile_base/base_planar_joint
    left_arm:
      - /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_joint1
      - /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1/left_fr3v2_joint2
      - /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1/left_fr3v2_link2/left_fr3v2_joint3
      - /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1/left_fr3v2_link2/left_fr3v2_link3/left_fr3v2_joint4
      - /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1/left_fr3v2_link2/left_fr3v2_link3/left_fr3v2_link4/left_fr3v2_joint5
      - /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1/left_fr3v2_link2/left_fr3v2_link3/left_fr3v2_link4/left_fr3v2_link5/left_fr3v2_joint6
      - /ai_cell/left_FR3/left_fr3v2_link0/left_fr3v2_link1/left_fr3v2_link2/left_fr3v2_link3/left_fr3v2_link4/left_fr3v2_link5/left_fr3v2_link6/left_fr3v2_joint7
    right_arm:
      - /ai_cell/right_FR3/right_fr3v2_link0/right_fr3v2_joint1
      - /ai_cell/right_FR3/right_fr3v2_link0/right_fr3v2_link1/right_fr3v2_joint2
      - /ai_cell/right_FR3/right_fr3v2_link0/right_fr3v2_link1/right_fr3v2_link2/right_fr3v2_joint3
      - /ai_cell/right_FR3/right_fr3v2_link0/right_fr3v2_link1/right_fr3v2_link2/right_fr3v2_link3/right_fr3v2_joint4
      - /ai_cell/right_FR3/right_fr3v2_link0/right_fr3v2_link1/right_fr3v2_link2/right_fr3v2_link3/right_fr3v2_link4/right_fr3v2_joint5
      - /ai_cell/right_FR3/right_fr3v2_link0/right_fr3v2_link1/right_fr3v2_link2/right_fr3v2_link3/right_fr3v2_link4/right_fr3v2_link5/right_fr3v2_joint6
      - /ai_cell/right_FR3/right_fr3v2_link0/right_fr3v2_link1/right_fr3v2_link2/right_fr3v2_link3/right_fr3v2_link4/right_fr3v2_link5/right_fr3v2_link6/right_fr3v2_joint7

  articulation_checklist:
    single_articulation_root: true
    self_collision_disabled: true
    no_nested_rigid_bodies: true
    serial_chain_per_arm: true
    isaac_robot_api_on_root: required
    solver_iterations_set: true
    dof_count_expected:
      base: 3
      per_arm: 7
      total: 17

# ── URDF source files ─────────────────────────────────────────────────────────

urdf_sources:
  mobile_base:
    path: /workspace/assets/franka_description/robots/fr3_duo_mobile/mobile_base.urdf
    description: "Mobile base URDF (pending; defines base chassis and wheel geometry)."
    status: pending
  left_arm:
    path: /workspace/assets/franka_description/robots/fr3v2_1/fr3v2.urdf
    description: "Left FR3v2 arm URDF — authoritative source for joint limits and inertia."
  right_arm:
    path: /workspace/assets/franka_description/robots/fr3v2_1/fr3v2.urdf
    description: "Right FR3v2 arm URDF — same model as left arm."

# ── Runtime prim path resolution ─────────────────────────────────────────────

runtime:
  robot_prim_path: /World/ai_cell
  description: >
    Same runtime resolution as fr3duo_m+v. The articulation handle is
    constructed on /World/ai_cell after Play.

notes: |
  Mobile base USD asset is not yet built; this file describes the target structure.
  Do NOT nest arm link prims under mobile_base/ — flat /ai_cell/ layout required.
  See CLAUDE.md "USD articulation structure (critical)" for full rationale.
