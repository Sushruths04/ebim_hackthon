asset_key: table_board_fixture_cable_stable
label: table_board_fixture_cable_stable
cable_usd_path: assets/cable.usda
scene_usd_path: assets/table_board_fixture/table_board_fixture.usd
gripper_config_path: configs/gripper_stable.yaml
curve_prim_paths:
  - /cable/curve_0
scene:
  root_path: /World
  load_board: true
  load_visual_shapes: true
  hide_collision_shapes: true
board:
  load: true
  load_visual_shapes: true
  hide_collision_shapes: true
  visual_shapes_as_colliders: false
  friction: 1.0
  require_collision: false
  require_convex_collision: false
  support_plane:
    enabled: true
    infinite: false
    visible: false
    prim_path: /World/Table
    prim_paths:
      - /World/Table
      - /World/Table_01
    clearance: 0.0002
    expand: 0.005
  top_support:
    enabled: false
    visible: false
    prim_path: /World/board_segment/board_segment_bottom_left/Collisions/Collisions
    thickness: 0.004
    offset: 0.0005
    expand: 0.02
  floor_constraint:
    enabled: false
    prim_path: /World/board_segment/board_segment_bottom_left/Collisions/Collisions
    clearance: 0.0002
    expand: 0.0
    zero_downward_velocity: true
simulation:
  fps: 60
  substeps: 4
  iterations: 24
  gravity: [0.0, 0.0, -9.81]
solver:
  friction_epsilon: 0.01
  rigid_avbd_beta: 100000
  rigid_avbd_gamma: 0.99
  rigid_contact_hard: false
  rigid_contact_history: false
  rigid_contact_max: 65536
  rigid_body_contact_buffer_size: 8192
  rigid_body_particle_contact_buffer_size: 256
  rigid_joint_linear_ke: 1000000000.0
  rigid_joint_angular_ke: 1000000000.0
  rigid_joint_linear_k_start: 10000.0
  rigid_joint_angular_k_start: 10.0
  rigid_joint_linear_kd: 0.01
  rigid_joint_angular_kd: 0.0
contact:
  rigid_contact_margin: 0.0002
  rigid_gap: 0.0
shape:
  density: 1000.0
  ke: 5000.0
  kd: 0.05
  mu: 1.0
cable:
  friction: 1.0
  stretch_stiffness: 800000.0
  stretch_damping: 0.005
  bend_stiffness: 0.02
  bend_damping: 0.05
  dahl_friction:
    enabled: false
    eps_max: 0.5
    tau: 0.1
  self_collision_filter_neighbor_hops: 4
  fixed_points_as_static: true
  add_articulation: true
ground:
  enabled: false
  height: 0.0
